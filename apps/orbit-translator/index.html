<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Orbit Translator</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --bg-main: #0a0a0f;
            --bg-sidebar: #050508;
            --bg-card: #12121a;
            --bg-dock: rgba(18, 18, 26, 0.9);
            --text-primary: #ffffff;
            --text-secondary: #71717a;
            --border: rgba(255,255,255,0.08);
            --accent-purple: #8b5cf6;
            --accent-indigo: #6366f1;
            --accent-blue: #3b82f6;
            --accent-green: #22c55e;
            --accent-red: #ef4444;
            --shadow: 0 10px 40px rgba(0,0,0,0.5);
            --gradient: linear-gradient(135deg, #8b5cf6 0%, #6366f1 100%);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", Roboto, sans-serif; }
        body { background: var(--bg-main); color: var(--text-primary); min-height: 100vh; }

        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 20px;
            background: var(--bg-sidebar);
            border-bottom: 1px solid var(--border);
        }
        .brand { font-size: 1.2rem; font-weight: 700; display: flex; align-items: center; gap: 10px; }
        .brand span { background: var(--gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .back-btn { display: flex; align-items: center; gap: 8px; padding: 8px 16px; background: var(--bg-card); border: 1px solid var(--border); border-radius: 10px; color: var(--text-secondary); cursor: pointer; text-decoration: none; font-size: 0.9rem; }

        .container { max-width: 900px; margin: 0 auto; padding: 30px 20px 100px; }

        .translator-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 24px;
            box-shadow: var(--shadow);
        }

        .lang-row { display: flex; gap: 12px; margin-bottom: 20px; }
        
        select {
            flex: 1;
            padding: 14px 18px;
            background: var(--bg-main);
            border: 1px solid var(--border);
            border-radius: 12px;
            color: var(--text-primary);
            font-size: 1rem;
            cursor: pointer;
            outline: none;
        }
        select:focus { border-color: var(--accent-purple); }

        .swap-btn {
            width: 46px;
            height: 46px;
            border-radius: 12px;
            border: 1px solid var(--border);
            background: var(--bg-main);
            color: var(--accent-purple);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .textarea {
            width: 100%;
            min-height: 150px;
            padding: 16px;
            background: var(--bg-main);
            border: 1px solid var(--border);
            border-radius: 12px;
            color: var(--text-primary);
            font-size: 1.1rem;
            resize: vertical;
            outline: none;
            margin-bottom: 16px;
        }
        .textarea:focus { border-color: var(--accent-purple); }
        .textarea::placeholder { color: var(--text-secondary); }

        .translate-btn {
            width: 100%;
            padding: 16px;
            background: var(--gradient);
            border: none;
            border-radius: 12px;
            color: white;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        .translate-btn:hover { opacity: 0.9; }
        .translate-btn:disabled { opacity: 0.5; cursor: not-allowed; }

        .result-area {
            margin-top: 20px;
            padding: 16px;
            background: var(--bg-main);
            border: 1px solid var(--border);
            border-radius: 12px;
            min-height: 100px;
        }
        .result-text { font-size: 1.1rem; line-height: 1.6; white-space: pre-wrap; }
        .copy-btn {
            margin-top: 12px;
            padding: 8px 16px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 0.85rem;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        .copy-btn:hover { color: var(--text-primary); }

        .loading { display: none; align-items: center; gap: 10px; color: var(--accent-purple); }
        .loading.active { display: flex; }

        .history { margin-top: 30px; }
        .history h3 { font-size: 1rem; color: var(--text-secondary); margin-bottom: 15px; }
        .history-item {
            padding: 12px 16px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 10px;
            margin-bottom: 10px;
            cursor: pointer;
        }
        .history-item:hover { border-color: var(--accent-purple); }
        .history-from { font-size: 0.85rem; color: var(--text-secondary); margin-bottom: 4px; }
        .history-to { font-size: 0.95rem; }

        .dock-container { position: fixed; bottom: 25px; left: 0; right: 0; display: flex; justify-content: center; padding: 0 15px; }
        .dock { background: var(--bg-dock); backdrop-filter: blur(25px); border: 1px solid var(--border); border-radius: 28px; padding: 8px 12px; display: flex; align-items: center; gap: 6px; box-shadow: var(--shadow); }
        .dock-btn { width: 46px; height: 46px; border-radius: 18px; border: none; background: transparent; color: var(--text-secondary); cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .dock-btn:hover { color: var(--text-primary); }
        .dock-btn.active { color: var(--accent-purple); background: rgba(139, 92, 246, 0.15); }
    </style>
</head>
<body>
    <header class="header">
        <div class="brand">
            <i data-lucide="languages" style="color: var(--accent-purple)"></i>
            <span>Orbit Translate</span>
        </div>
        <a href="https://mainhub-one.vercel.app" class="back-btn"><i data-lucide="arrow-left"></i> Home</a>
    </header>

    <div class="container">
        <div class="translator-card">
            <div class="lang-row">
                <select id="fromLang">
                    <option value="auto">Auto Detect</option>
                    <option value="en" selected>English</option>
                    <option value="es">Spanish</option>
                    <option value="fr">French</option>
                    <option value="de">German</option>
                    <option value="it">Italian</option>
                    <option value="pt">Portuguese</option>
                    <option value="ru">Russian</option>
                    <option value="ja">Japanese</option>
                    <option value="ko">Korean</option>
                    <option value="zh">Chinese</option>
                    <option value="tl">Filipino</option>
                </select>
                <button class="swap-btn" onclick="swapLangs()"><i data-lucide="arrow-left-right"></i></button>
                <select id="toLang">
                    <option value="en">English</option>
                    <option value="es">Spanish</option>
                    <option value="fr">French</option>
                    <option value="de">German</option>
                    <option value="it">Italian</option>
                    <option value="pt">Portuguese</option>
                    <option value="ru">Russian</option>
                    <option value="ja">Japanese</option>
                    <option value="ko">Korean</option>
                    <option value="zh">Chinese</option>
                    <option value="tl" selected>Filipino</option>
                </select>
            </div>

            <textarea id="inputText" class="textarea" placeholder="Enter text to translate..."></textarea>

            <button class="translate-btn" onclick="translateText()">
                <i data-lucide="languages"></i>
                <span>Translate</span>
                <div id="loading" class="loading"><i data-lucide="loader-2" class="animate-spin"></i> Translating...</div>
            </button>

            <div id="result" class="result-area" style="display:none;">
                <div id="resultText" class="result-text"></div>
                <button class="copy-btn" onclick="copyResult()"><i data-lucide="copy"></i> Copy</button>
            </div>
        </div>
    </div>

    <script>
        lucide.createIcons();

        async function translateText() {
            const text = document.getElementById('inputText').value.trim();
            if (!text) return;

            const from = document.getElementById('fromLang').value;
            const to = document.getElementById('toLang').value;
            
            document.querySelector('.translate-btn span').style.display = 'none';
            document.getElementById('loading').classList.add('active');

            try {
                const response = await fetch('https://api.mymemory.translated.net/get?q=' + encodeURIComponent(text) + '&langpair=' + from + '|' + to);
                const data = await response.json();
                
                document.getElementById('resultText').textContent = data.responseData.translatedText;
                document.getElementById('result').style.display = 'block';
            } catch (e) {
                document.getElementById('resultText').textContent = 'Translation error. Please try again.';
                document.getElementById('result').style.display = 'block';
            }

            document.querySelector('.translate-btn span').style.display = 'inline';
            document.getElementById('loading').classList.remove('active');
        }

        function swapLangs() {
            const from = document.getElementById('fromLang');
            const to = document.getElementById('toLang');
            const temp = from.value;
            from.value = to.value;
            to.value = temp;
        }

        function copyResult() {
            const text = document.getElementById('resultText').textContent;
            navigator.clipboard.writeText(text);
        }
    </script>
</body>
</html>
